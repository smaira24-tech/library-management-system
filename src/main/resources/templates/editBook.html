<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-primary mb-4">Edit Book</h2>

    <form action="/updateBook" method="post" class="card p-4 shadow-sm">

        <input type="hidden" name="bookId" th:value="${book.bookId}">

        <label>Title</label>
        <input class="form-control mb-3" type="text" name="title" th:value="${book.title}" required>

        <label>Author</label>
        <input class="form-control mb-3" type="text" name="author" th:value="${book.author}" required>

        <label>Quantity</label>
        <input class="form-control mb-3" type="number" name="quantity" th:value="${book.quantity}" required>

        <button class="btn btn-success">Update Book</button>
        <a href="/" class="btn btn-secondary mt-2">Back</a>

    </form>

</div>

</body>
</html>
